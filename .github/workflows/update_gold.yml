name: Update Gold Price

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'   # mỗi giờ

jobs:
  update-gold:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch gold price from BTMC API
        run: |
          sudo apt-get update
          sudo apt-get install -y jq curl

          RESPONSE=$(curl -s "http://api.btmc.vn/api/BTMCAPI/getpricebtmc?key=3kd8ub1llcg9t45hnoh8hmn7t5kc2v")

          # Lấy giá SJC (vàng miếng SJC)
          SJC_BUY=$(echo "$RESPONSE" | jq -r '.Data[] | select(.Type=="SJC") | .Buy')
          SJC_SELL=$(echo "$RESPONSE" | jq -r '.Data[] | select(.Type=="SJC") | .Sell')

          cat <<EOF > data.json
          {
            "sjc_buy": "$SJC_BUY",
            "sjc_sell": "$SJC_SELL",
            "updated_at": "$(date +'%d/%m/%Y %H:%M')"
          }
          EOF

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data.json

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update gold price"
            git push origin HEAD
          fi
