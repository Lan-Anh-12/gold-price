name: Update Gold Price (SJC)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *' # Chạy tự động mỗi tiếng 1 lần

jobs:
  update-gold:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch and Force Update
        run: |
          # Cài đặt công cụ tính toán và xử lý JSON
          sudo apt-get install -y bc jq

          # 1. Gọi API lấy giá vàng
          RESPONSE=$(curl -s -L -H "User-Agent: Mozilla/5.0" "https://www.vang.today/api/prices?type=SJL1L10")
          
          # 2. SỬA LỖI TẠI ĐÂY: Lấy trực tiếp từ Object (Bỏ .data[0])
          RAW_BUY=$(echo "$RESPONSE" | jq -r '.buy // "0"')
          RAW_SELL=$(echo "$RESPONSE" | jq -r '.sell // "0"')

          # 3. Chuyển đổi sang đơn vị Triệu (Ví dụ: 184000000 / 1000000 = 184.0)
          if [ "$RAW_BUY" != "0" ] && [ "$RAW_BUY" != "null" ]; then
            SJC_BUY=$(echo "scale=1; $RAW_BUY / 1000000" | bc)
            SJC_SELL=$(echo "scale=1; $RAW_SELL / 1000000" | bc)
          else
            SJC_BUY="---"
            SJC_SELL="---"
          fi

          # 4. Lấy thời gian VN (+7) kèm số giây để ép Git Push bản mới
          UPDATED_AT=$(date -d '+7 hours' +'%d/%m/%Y %H:%M:%S')

          # 5. Ghi file data.json
          echo "{\"sjc_buy\": \"$SJC_BUY\", \"sjc_sell\": \"$SJC_SELL\", \"updated_at\": \"$UPDATED_AT\"}" > data.json
          
          # In ra để bạn soi log trong tab Actions nếu vẫn lỗi
          echo "Check file content:"
          cat data.json

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          # Commit kèm mốc giây để nội dung luôn khác biệt
          git commit -m "Update Price: $(date -d '+7 hours' +'%H:%M:%S')" || exit 0
          git push origin HEAD
