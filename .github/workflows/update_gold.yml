name: Update Gold Price (vang.today)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'   # mỗi giờ

jobs:
  update-gold:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch & compare SJC gold price
        run: |
          sudo apt-get update
          sudo apt-get install -y jq curl

          TODAY_RESPONSE=$(curl -s "https://www.vang.today/api/prices?type=SJL1L10")
          HISTORY_RESPONSE=$(curl -s "https://www.vang.today/api/prices?type=SJL1L10&days=2")

          # Giá hôm nay
          TODAY_BUY=$(echo "$TODAY_RESPONSE" | jq -r '.data[0].buy // empty')
          TODAY_SELL=$(echo "$TODAY_RESPONSE" | jq -r '.data[0].sell // empty')

          # Giá hôm qua (item cuối cùng)
          YESTERDAY_BUY=$(echo "$HISTORY_RESPONSE" | jq -r '.data[-1].buy // empty')
          YESTERDAY_SELL=$(echo "$HISTORY_RESPONSE" | jq -r '.data[-1].sell // empty')

          # Nếu API lỗi → không commit
          if [ -z "$TODAY_BUY" ] || [ -z "$YESTERDAY_BUY" ]; then
            echo "❌ Failed to fetch gold price"
            exit 0
          fi

          # So sánh
          BUY_DIFF=$((TODAY_BUY - YESTERDAY_BUY))
          SELL_DIFF=$((TODAY_SELL - YESTERDAY_SELL))

          if [ "$BUY_DIFF" -gt 0 ]; then
            BUY_TREND="up"
          elif [ "$BUY_DIFF" -lt 0 ]; then
            BUY_TREND="down"
          else
            BUY_TREND="same"
          fi

          cat <<EOF > data.json
          {
            "type": "SJC",
            "today": {
              "buy": $TODAY_BUY,
              "sell": $TODAY_SELL
            },
            "yesterday": {
              "buy": $YESTERDAY_BUY,
              "sell": $YESTERDAY_SELL
            },
            "change": {
              "buy_diff": $BUY_DIFF,
              "sell_diff": $SELL_DIFF,
              "trend": "$BUY_TREND"
            },
            "updated_at": "$(date +'%d/%m/%Y %H:%M')"
          }
          EOF

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data.json

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update SJC gold price"
            git push origin HEAD
          fi
