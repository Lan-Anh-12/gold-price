name: Update Gold Price

on:
  workflow_dispatch: # Cho phép bấm nút chạy tay để test
  schedule:
    - cron: '0 * * * *' # Chạy mỗi giờ

jobs:
  update-gold:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch Gold Price
        run: |
          # Sử dụng User-Agent để tránh bị API chặn (giả lập trình duyệt)
          RESPONSE=$(curl -s -H "User-Agent: Mozilla/5.0" "https://www.vang.today/api/prices?type=SJL1L10")
          
          # Lấy giá trị và bỏ dấu ngoặc kép, đảm bảo là số
          BUY=$(echo "$RESPONSE" | jq -r '.data[0].buy // empty')
          SELL=$(echo "$RESPONSE" | jq -r '.data[0].sell // empty')

          if [ -z "$BUY" ]; then
            echo "❌ API Error: Không lấy được dữ liệu"
            exit 1 # Báo lỗi đỏ để bạn biết
          fi

          # Chuyển sang đơn vị Triệu (ví dụ 89000000 -> 89.0)
          BUY_TRIEU=$(echo "scale=1; $BUY / 1000000" | bc)
          SELL_TRIEU=$(echo "scale=1; $SELL / 1000000" | bc)

          # Ghi đè file data.json theo đúng cấu trúc cũ của bạn
          cat <<EOF > data.json
          {
            "sjc_buy": "$BUY_TRIEU",
            "sjc_sell": "$SELL_TRIEU",
            "updated_at": "$(date -d '+7 hours' +'%d/%m/%Y %H:%M')"
          }
          EOF

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git commit -m "Update: $(date)" || exit 0 # Không có thay đổi thì thôi
          git push
