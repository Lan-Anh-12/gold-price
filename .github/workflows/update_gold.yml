name: Update Gold Price (SJC)
on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *' # Chạy mỗi tiếng 1 lần

jobs:
  update-gold:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Fetch and Force Update
        run: |
          # Lấy dữ liệu từ API
          RESPONSE=$(curl -s -H "User-Agent: Mozilla/5.0" "https://www.vang.today/api/prices?type=SJL1L10&limit=1")
          BUY=$(echo "$RESPONSE" | jq -r '.data[0].buy // "0"')
          SELL=$(echo "$RESPONSE" | jq -r '.data[0].sell // "0"')
          
          # PHẢI CÓ GIÂY (%S) ĐỂ NỘI DUNG FILE LUÔN KHÁC NHAU
          UPDATED_AT=$(date -d '+7 hours' +'%d/%m/%Y %H:%M:%S')
          
          SJC_BUY=$(echo "scale=1; $BUY / 1000000" | bc)
          SJC_SELL=$(echo "scale=1; $SELL / 1000000" | bc)
          
          # Ghi đè file data.json
          echo "{\"sjc_buy\": \"$SJC_BUY\", \"sjc_sell\": \"$SJC_SELL\", \"updated_at\": \"$UPDATED_AT\"}" > data.json
          
      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          # Commit kèm mốc thời gian chi tiết để ép Git thực hiện
          git commit -m "Force Update: $(date -d '+7 hours' +'%H:%M:%S')" || exit 0
          git push origin HEAD
