<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Giá vàng hôm nay</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background: #f5f5f5;
            padding: 40px;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            display: inline-block;
            min-width: 300px;
        }

        h1 {
            margin-bottom: 20px;
        }

        .price {
            font-size: 28px;
            font-weight: bold;
            margin: 10px 0;
        }

        .update {
            margin-top: 20px;
            font-size: 14px;
            color: gray;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Giá vàng SJC</h1>

        <div>
            Mua vào:
            <div id="buy-price" class="price">Đang tải...</div>
        </div>

        <div>
            Bán ra:
            <div id="sell-price" class="price">Đang tải...</div>
        </div>

        <div class="update">
            Cập nhật: <span id="last-update">Đang tải...</span>
        </div>
    </div>

    <!-- Gọi file JS riêng -->
    <script src="script.js"></script>

</body>
</html>
