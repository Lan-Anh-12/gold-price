<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Giá Vàng SJC Hôm Nay</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:,">

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            background: #f0f2f5;
            padding: 40px 20px;
            margin: 0;
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            display: inline-block;
            width: 100%;
            max-width: 350px;
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        h1 {
            color: #333;
            font-size: 24px;
            margin-bottom: 30px;
            border-bottom: 2px solid #ffd700;
            padding-bottom: 10px;
            display: inline-block;
        }

        .price-container {
            margin: 20px 0;
        }

        .label {
            font-size: 14px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .price {
            font-size: 32px;
            font-weight: 800;
            margin: 5px 0;
            color: #d4af37; /* Màu vàng kim loại */
        }

        .update {
            margin-top: 30px;
            font-size: 13px;
            color: #999;
            background: #f9f9f9;
            padding: 8px;
            border-radius: 8px;
        }

        /* Hiệu ứng khi đang tải */
        .loading {
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Giá vàng SJC</h1>

        <div class="price-container">
            <div class="label">Mua vào</div>
            <div id="buy-price" class="price loading">...</div>
        </div>

        <div class="price-container">
            <div class="label">Bán ra</div>
            <div id="sell-price" class="price loading">...</div>
        </div>

        <div class="update">
            🕒 Cập nhật: <span id="last-update">Đang lấy dữ liệu...</span>
        </div>
    </div>

    <script src="script.js"></script>

</body>
</html>
